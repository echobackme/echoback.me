# Generic multi-locale Nginx configuration
# Serves built locale directories (e.g., /ru/, /en/) from the same container
# and handles SPA routing for each locale separately.

server {
    listen ${PORT};
    
    # Must match the destination path in Dockerfile
    root /usr/share/nginx/html;
    index index.html;

    # Shared assets are located at the root of the html directory
    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve the default locale directly at the root domain '/' without redirect
    location = / {
        try_files /ru/index.html =404;
    }

    # Dynamic support for any 2-letter locale directory (e.g. /ru/, /en/)
    # Provides SPA (HTML5 History API) fallback to the specific locale's index.html.
    # If the locale directory does not exist, triggers a 404 which serves 404.html.
    location ~ "^/(\w{2})(/|$)" {
        try_files $uri $uri/ /$1/index.html =404;
    }

    # Fallback for other paths to the default locale
    location / {
        try_files $uri $uri/ /ru/index.html;
    }
}
