# Nginx configuration for single-locale deployment (ru)
# This config serves the application from the 'ru' subdirectory as the domain root (/)
# Shared assets are served from the parent directory

server {
    listen 80;
    server_name localhost;
    
    # Root points directly to the locale folder
    root /usr/share/nginx/html/ru;
    index index.html;

    # Shared assets are located one level above the locale folder
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA support for the root domain
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Support for explicit locale prefix (e.g., /ru/compose -> /compose)
    location /ru/ {
        rewrite ^/ru/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;
}
