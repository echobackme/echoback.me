name: Manual Check Demo

on:
    workflow_dispatch:
        inputs:
            reason:
                description: 'Reason'
                required: false
                default: 'Demo Check'

jobs:
    verify:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            
            - name: Install Node
              uses: actions/setup-node@v6
              with:
                  node-version-file: 'apps/web_client/package.json'
                  cache: 'yarn'
                  cache-dependency-path: 'apps/web_client/yarn.lock'
            
            - name: Install Dependencies
              run: yarn install --frozen-lockfile
            
            - name: Run Build
              run: yarn build
