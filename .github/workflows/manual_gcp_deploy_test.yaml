name: Manual GCP Deploy

on:
    workflow_dispatch:
        inputs:
            reason:
                description: 'Tag'
                required: true
                default: 'qa1'

env:
    PROJECT_ID: echobackme
    REGION: europe-central2
    REPOSITORY: images
    IMAGE: web-client

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            
            - name: "Authenticate to Google Cloud"
              uses: "google-github-actions/auth@v3"
              with:
                  credentials_json: '${{ secrets.GCP_SA_KEY }}'
            
            - name: "Set up Cloud SDK"
              uses: "google-github-actions/setup-gcloud@v3"
            
            - name: "Docker Auth"
              run: |
                  gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev
            
            - name: "Build and Push"
              run: |
                  docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.event.inputs.reason }} ./apps/web_client
                  docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.event.inputs.reason }}
