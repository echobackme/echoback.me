name: Auto Check Demo

on:
    push:
        branches: ["main"]

jobs:
    verify:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            
            - name: Install Node
              uses: actions/setup-node@v6
              with:
                  node-version-file: 'package.json'
                  cache: 'yarn'
            
            - name: Install Dependencies
              run: yarn install --frozen-lockfile
            
            - name: Run Build
              run: yarn build
