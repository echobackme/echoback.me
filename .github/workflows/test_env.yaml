name: Deploy To Testing Env

on:
    push:
        branches:
            - main
        paths:
            - ./apps/web_client/**'

env:
    PROJECT_ID: echobackme
    REGION: europe-north1
    SERVICE_NAME: web-client-test
    REPOSITORY: images
    IMAGE: web-client
    TAG: test

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            
            - name: "Authenticate to Google Cloud"
              uses: "google-github-actions/auth@v3"
              with:
                  credentials_json: ${{ secrets.GCP_SA_KEY }}
            
            - name: "Set up Cloud SDK"
              uses: "google-github-actions/setup-gcloud@v3"
            
            - name: "Docker Auth"
              run: |
                  gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev
            
            - name: "Build and Push"
              run: |
                  docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ env.TAG }} ./apps/web_client
                  docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ env.TAG }}
            
            - name: "Deploy to Cloud Run"
              uses: "google-github-actions/deploy-cloudrun@v3"
              with:
                  service: "${{ env.SERVICE_NAME }}"
                  image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ env.TAG }}
                  region: ${{ env.REGION }}
